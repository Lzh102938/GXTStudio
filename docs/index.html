<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GXTStudio - GTA文本资源编辑器</title>
    <link rel="icon" type="image/x-icon" href="icon/favicon.ico">
    <link rel="icon" type="image/png" href="icon/favicon.png">
    <link rel="apple-touch-icon" href="icon/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                        },
                        accent: {
                            400: '#22d3ee',
                            500: '#06b6d4',
                        }
                    },
                    animation: {
                        'float': 'float 3s ease-in-out infinite',
                        'pulse-slow': 'pulse 3s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                    },
                },
            },
        }
    </script>
    <style>
        html { scroll-behavior: smooth; min-height: 100vh; }
        body { 
            -webkit-font-smoothing: antialiased; 
            -moz-osx-font-smoothing: grayscale;
            background-image: url('image/Background.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.35);
            pointer-events: none;
            z-index: 0;
        }
        
        .dark body::before,
        html.dark body::before {
            background: rgba(15, 23, 42, 0.55);
        }
        
        #root {
            position: relative;
            z-index: 1;
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #f97316, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #f97316, #ec4899);
        }
        
        .glass {
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            transform: translateZ(0);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(24px) saturate(200%);
            -webkit-backdrop-filter: blur(24px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transform: translateZ(0);
        }

        .dark .glass-card {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .glass-button {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transform: translateZ(0);
        }

        .dark .glass-button {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transform: translateZ(0);
        }

        .dark .glass-input {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(32px) saturate(180%);
            -webkit-backdrop-filter: blur(32px) saturate(180%);
            transform: translateZ(0);
        }

        .dark .glass-panel {
            background: rgba(15, 23, 42, 0.6);
        }

        .glass-badge {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transform: translateZ(0);
        }

        .dark .glass-badge {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .immersive-section {
            background: transparent;
        }
        
        .immersive-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: none;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            transform: translateZ(0);
        }

        .dark .immersive-card {
            background: rgba(30, 41, 59, 0.4);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .immersive-badge {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: none;
            transform: translateZ(0);
        }

        .dark .immersive-badge {
            background: rgba(30, 41, 59, 0.5);
        }
        
        .animate-on-view {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .animate-on-view.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        .animate-on-view.from-left {
            transform: translateX(-30px) translateY(30px);
        }
        
        .animate-on-view.from-left.visible {
            transform: translateX(0) translateY(0);
        }
        
        .animate-on-view.from-right {
            transform: translateX(30px) translateY(30px);
        }
        
        .animate-on-view.from-right.visible {
            transform: translateX(0) translateY(0);
        }
        
        @keyframes blink {
            50% { opacity: 0; }
        }
        
        .cursor-blink {
            animation: blink 1s step-end infinite;
        }
        
        @keyframes codeFadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .code-line-animate {
            opacity: 0;
            animation: codeFadeIn 0.5s ease forwards;
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        
        .card-hover {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateZ(0);
        }
        .card-hover:hover { transform: translateY(-8px) scale(1.02) translateZ(0); }
        
        .btn-hover:hover { transform: translateY(-2px); }
        .btn-hover:active { transform: translateY(0); }
        
        .particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        
        .cursor-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(37, 99, 235, 0.15) 0%, transparent 70%);
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 0;
            transition: opacity 0.3s ease;
        }
        
        .dark .cursor-glow {
            background: radial-gradient(circle, rgba(96, 165, 250, 0.1) 0%, transparent 70%);
        }
        
        @media (max-width: 768px) {
            .particle-canvas, .cursor-glow { display: none; }
        }
        
        .stagger-1 { animation-delay: 0.1s; }
        .stagger-2 { animation-delay: 0.2s; }
        .stagger-3 { animation-delay: 0.3s; }
        .stagger-4 { animation-delay: 0.4s; }
        .stagger-5 { animation-delay: 0.5s; }
        .stagger-6 { animation-delay: 0.6s; }
        .stagger-7 { animation-delay: 0.7s; }
        .stagger-8 { animation-delay: 0.8s; }

        .page-loader {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        
        .dark .page-loader {
            background: #0f172a;
        }
        
        .page-loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        @keyframes loaderPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 30px 10px rgba(249, 115, 22, 0.3); }
        }

        .loader-icon {
            animation: loaderPulse 1.5s ease infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slide-in-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-slide-in-up {
            animation: slide-in-up 0.4s ease forwards;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(249, 115, 22, 0.3); }
            50% { box-shadow: 0 0 40px rgba(249, 115, 22, 0.5); }
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }

        @keyframes ripple {
            to { transform: scale(4); opacity: 0; }
        }

        .ripple-effect {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            width: 100px;
            height: 100px;
            transform: scale(0);
            animation: ripple 0.6s linear;
            pointer-events: none;
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes rotateIn {
            from { opacity: 0; transform: rotate(-10deg) scale(0.9); }
            to { opacity: 1; transform: rotate(0) scale(1); }
        }

        .animate-slide-in-left { animation: slideInLeft 0.6s ease forwards; }
        .animate-slide-in-right { animation: slideInRight 0.6s ease forwards; }
        .animate-slide-in-up { animation: slideInUp 0.6s ease forwards; }
        .animate-scale-in { animation: scaleIn 0.5s ease forwards; }
        .animate-rotate-in { animation: rotateIn 0.5s ease forwards; }

        .parallax-slow,
        .parallax-medium,
        .parallax-fast {
            will-change: transform;
            transform: translateZ(0);
        }

        .hover-lift { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .hover-lift:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }

        .hover-glow { transition: box-shadow 0.3s ease; }
        .hover-glow:hover { box-shadow: 0 0 30px rgba(249, 115, 22, 0.3); }

        .text-shimmer {
            background: linear-gradient(90deg, #f97316, #ec4899, #f97316);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
        }

        .glow-border {
            position: relative;
        }

        .glow-border::before {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(45deg, #f97316, #ec4899, #f97316);
            border-radius: inherit;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .glow-border:hover::before {
            opacity: 1;
        }

        .magnetic-btn {
            transition: transform 0.2s ease;
        }

        @keyframes bounce-subtle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .animate-bounce-subtle {
            animation: bounce-subtle 2s ease-in-out infinite;
        }

        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .gradient-animate {
            background-size: 200% 200%;
            animation: gradient-shift 5s ease infinite;
        }

        @keyframes glow-pulse {
            0%, 100% { box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); }
            50% { box-shadow: 0 0 25px rgba(59, 130, 246, 0.35); }
        }

        .glow-pulse {
            animation: glow-pulse 3s ease-in-out infinite;
        }

        @keyframes border-glow {
            0%, 100% { border-color: rgba(59, 130, 246, 0.3); }
            50% { border-color: rgba(59, 130, 246, 0.6); }
        }

        .border-glow {
            animation: border-glow 2s ease-in-out infinite;
        }

        @keyframes subtle-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .subtle-float {
            animation: subtle-float 4s ease-in-out infinite;
        }

        @keyframes gradient-text-flow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .gradient-text-flow {
            background: linear-gradient(90deg, #3b82f6, #6366f1, #8b5cf6, #3b82f6);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient-text-flow 4s linear infinite;
        }

        .hover-lift {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .hover-lift:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.15);
        }

        .hover-scale {
            transition: transform 0.2s ease;
        }

        .hover-scale:hover {
            transform: scale(1.02);
        }

        .magnetic-hover {
            transition: transform 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        @keyframes ripple-expand {
            0% { transform: scale(0); opacity: 0.4; }
            100% { transform: scale(4); opacity: 0; }
        }

        .ripple-container {
            position: relative;
            overflow: hidden;
        }

        .ripple-effect-btn {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: scale(0);
            animation: ripple-expand 0.5s ease-out;
            pointer-events: none;
        }

        @keyframes typewriter-cursor {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .typewriter-cursor::after {
            content: '|';
            animation: typewriter-cursor 0.8s infinite;
        }

        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in-up {
            animation: fade-in-up 0.4s ease-out forwards;
        }

        @keyframes scale-in {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .scale-in {
            animation: scale-in 0.3s ease-out forwards;
        }

        .text-2xl {
            font-size: 1.5rem;
            line-height: 2rem;
        }

        .font-bold {
            font-weight: 700;
        }

        @media (max-width: 640px) {
            html { font-size: 14px; }
            body { background-attachment: scroll; }
            .immersive-card { padding: 1rem; }
            .glass-panel { padding: 0.75rem; }
            .container { padding-left: 1rem; padding-right: 1rem; }
            section { padding-top: 3rem; padding-bottom: 3rem; }
            .hover-lift:hover { transform: none; }
            .hover-scale:hover { transform: none; }
            .magnetic-hover { transition: none; }
            .magnetic-btn { transition: none; }
            .glow-border::before { display: none; }
            .btn-hover:hover { transform: none; }
            .card-hover:hover { transform: none; }
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 transition-colors duration-300">
    <div id="pageLoader" class="page-loader">
        <div class="text-center">
            <img src="icon/favicon.png" alt="GXTStudio" style="width: 60px; height: 60px; border-radius: 16px; margin-bottom: 20px;" class="loader-icon">
            <div class="text-slate-500 dark:text-slate-400">正在加载...</div>
        </div>
    </div>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" data-presets="react">
        // @ts-nocheck
        /* eslint-disable */
        const { useState, useEffect, useRef, useCallback, useMemo, createContext, useContext } = React;

        const ThemeContext = createContext();

        const useTheme = () => useContext(ThemeContext);

        const useInView = (options = {}) => {
            const ref = useRef(null);
            const [isInView, setIsInView] = useState(false);

            useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) {
                        setIsInView(true);
                        observer.unobserve(entry.target);
                    }
                }, { threshold: 0.1, ...options });

                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, []);

            return [ref, isInView];
        };

        const useAnimatedValue = (end, duration = 2000, start = 0) => {
            const [value, setValue] = useState(start);
            const [ref, isInView] = useInView();

            useEffect(() => {
                if (!isInView) return;
                const startTime = performance.now();
                const animate = (currentTime) => {
                    const elapsed = currentTime - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    const easeProgress = 1 - Math.pow(1 - progress, 3);
                    setValue(Math.floor(easeProgress * (end - start) + start));
                    if (progress < 1) requestAnimationFrame(animate);
                    else setValue(end);
                };
                requestAnimationFrame(animate);
            }, [isInView, end, duration, start]);

            return [ref, value];
        };

        const useSpring = (target, config = { tension: 170, friction: 26 }) => {
            const [value, setValue] = useState(0);
            const currentRef = useRef(0);
            const velocityRef = useRef(0);
            const targetRef = useRef(target);
            const frameRef = useRef();

            useEffect(() => {
                targetRef.current = target;
            }, [target]);

            useEffect(() => {
                const animate = () => {
                    const current = currentRef.current;
                    const targetVal = targetRef.current;
                    const velocity = velocityRef.current;
                    
                    const force = (targetVal - current) * config.tension * 0.001;
                    const damping = velocity * config.friction * 0.01;
                    
                    const newVelocity = velocity + force - damping;
                    const newValue = current + newVelocity;
                    
                    currentRef.current = newValue;
                    velocityRef.current = newVelocity;
                    setValue(newValue);
                    
                    if (Math.abs(targetVal - newValue) > 0.001 || Math.abs(newVelocity) > 0.001) {
                        frameRef.current = requestAnimationFrame(animate);
                    }
                };
                
                frameRef.current = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(frameRef.current);
            }, [config.tension, config.friction]);

            return value;
        };

        const useTypewriter = (text, speed = 50, delay = 0) => {
            const [displayText, setDisplayText] = useState('');
            const [isTyping, setIsTyping] = useState(false);

            useEffect(() => {
                setDisplayText('');
                setIsTyping(true);
                
                const timeout = setTimeout(() => {
                    let index = 0;
                    const interval = setInterval(() => {
                        if (index < text.length) {
                            setDisplayText(text.slice(0, index + 1));
                            index++;
                        } else {
                            setIsTyping(false);
                            clearInterval(interval);
                        }
                    }, speed);
                    
                    return () => clearInterval(interval);
                }, delay);
                
                return () => clearTimeout(timeout);
            }, [text, speed, delay]);

            return { displayText, isTyping };
        };

        const useMousePosition = () => {
            const positionRef = useRef({ x: 0, y: 0 });
            const [position, setPosition] = useState({ x: 0, y: 0 });
            const rafRef = useRef(null);

            useEffect(() => {
                const handleMouseMove = (e) => {
                    positionRef.current = { x: e.clientX, y: e.clientY };
                    if (!rafRef.current) {
                        rafRef.current = requestAnimationFrame(() => {
                            setPosition(positionRef.current);
                            rafRef.current = null;
                        });
                    }
                };
                window.addEventListener('mousemove', handleMouseMove);
                return () => {
                    window.removeEventListener('mousemove', handleMouseMove);
                    if (rafRef.current) cancelAnimationFrame(rafRef.current);
                };
            }, []);

            return position;
        };

        const useScrollDirection = () => {
            const [scrollDirection, setScrollDirection] = useState('up');
            const [scrollY, setScrollY] = useState(0);
            const lastScrollYRef = useRef(0);
            const directionRef = useRef('up');
            const rafRef = useRef(null);

            useEffect(() => {
                const updateScrollDirection = () => {
                    const currentScrollY = window.scrollY;
                    const lastScrollY = lastScrollYRef.current;
                    const direction = currentScrollY > lastScrollY ? 'down' : 'up';

                    if (direction !== directionRef.current && Math.abs(currentScrollY - lastScrollY) > 10) {
                        directionRef.current = direction;
                        setScrollDirection(direction);
                    }
                    setScrollY(currentScrollY);
                    lastScrollYRef.current = currentScrollY > 0 ? currentScrollY : 0;
                    rafRef.current = null;
                };

                const handleScroll = () => {
                    if (!rafRef.current) {
                        rafRef.current = requestAnimationFrame(updateScrollDirection);
                    }
                };

                window.addEventListener('scroll', handleScroll, { passive: true });
                return () => {
                    window.removeEventListener('scroll', handleScroll);
                    if (rafRef.current) cancelAnimationFrame(rafRef.current);
                };
            }, []);

            return { scrollDirection, scrollY };
        };

        const useLocalStorage = (key, initialValue) => {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) {
                    return initialValue;
                }
            });

            const setValue = (value) => {
                try {
                    const valueToStore = value instanceof Function ? value(storedValue) : value;
                    setStoredValue(valueToStore);
                    window.localStorage.setItem(key, JSON.stringify(valueToStore));
                } catch (error) {
                    console.error(error);
                }
            };

            return [storedValue, setValue];
        };

        const useDebounce = (value, delay) => {
            const [debouncedValue, setDebouncedValue] = useState(value);

            useEffect(() => {
                const handler = setTimeout(() => {
                    setDebouncedValue(value);
                }, delay);

                return () => clearTimeout(handler);
            }, [value, delay]);

            return debouncedValue;
        };

        const MotionDiv = ({ children, className = '', delay = 0, from = 'bottom', ...props }) => {
            const [ref, isInView] = useInView();
            const fromClass = from === 'left' ? 'from-left' : from === 'right' ? 'from-right' : '';
            
            return (
                <div 
                    ref={ref} 
                    className={`animate-on-view ${fromClass} ${className}`}
                    style={{ 
                        transitionDelay: `${delay}ms`,

                    }}
                    {...props}
                >
                    {children}
                </div>
            );
        };

        const ParticleCanvas = () => {
            const canvasRef = useRef(null);
            const { isDark } = useTheme();

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                let particles = [];
                let mouse = { x: -1000, y: -1000 };
                let animationId;
                let frameCount = 0;

                const resize = () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                };

                const init = () => {
                    particles = [];
                    for (let i = 0; i < 25; i++) {
                        particles.push({
                            x: Math.random() * canvas.width,
                            y: Math.random() * canvas.height,
                            vx: (Math.random() - 0.5) * 0.3,
                            vy: (Math.random() - 0.5) * 0.3,
                            radius: Math.random() * 1.5 + 0.5,
                            opacity: Math.random() * 0.15 + 0.05
                        });
                    }
                };

                const animate = () => {
                    frameCount++;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    const color = isDark ? '96, 165, 250' : '37, 99, 235';

                    particles.forEach((p, i) => {
                        const dx = mouse.x - p.x;
                        const dy = mouse.y - p.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);

                        if (dist < 150 && dist > 0) {
                            const force = (150 - dist) / 150;
                            p.vx -= (dx / dist) * force * 0.02;
                            p.vy -= (dy / dist) * force * 0.02;
                        }

                        p.x += p.vx;
                        p.y += p.vy;
                        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                        p.vx *= 0.99;
                        p.vy *= 0.99;

                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(${color}, ${p.opacity})`;
                        ctx.fill();

                        if (frameCount % 2 === 0) {
                            for (let j = i + 1; j < particles.length; j++) {
                                const p2 = particles[j];
                                const dx2 = p.x - p2.x;
                                const dy2 = p.y - p2.y;
                                const distance = Math.sqrt(dx2 * dx2 + dy2 * dy2);
                                if (distance < 120) {
                                    ctx.beginPath();
                                    ctx.moveTo(p.x, p.y);
                                    ctx.lineTo(p2.x, p2.y);
                                    ctx.strokeStyle = `rgba(${color}, ${0.08 * (1 - distance / 120)})`;
                                    ctx.lineWidth = 0.5;
                                    ctx.stroke();
                                }
                            }
                        }
                    });

                    animationId = requestAnimationFrame(animate);
                };

                const handleMouseMove = (e) => { mouse.x = e.clientX; mouse.y = e.clientY; };
                const handleResize = () => { resize(); init(); };

                resize();
                init();
                animate();

                window.addEventListener('mousemove', handleMouseMove);
                window.addEventListener('resize', handleResize);

                return () => {
                    cancelAnimationFrame(animationId);
                    window.removeEventListener('mousemove', handleMouseMove);
                    window.removeEventListener('resize', handleResize);
                };
            }, [isDark]);

            return <canvas ref={canvasRef} className="particle-canvas" />;
        };

        const CursorGlow = () => {
            const glowRef = useRef(null);
            const mouseRef = useRef({ x: 0, y: 0 });
            const glowPosRef = useRef({ x: 0, y: 0 });

            useEffect(() => {
                const handleMouseMove = (e) => {
                    mouseRef.current = { x: e.clientX, y: e.clientY };
                };

                const animate = () => {
                    glowPosRef.current.x += (mouseRef.current.x - glowPosRef.current.x) * 0.1;
                    glowPosRef.current.y += (mouseRef.current.y - glowPosRef.current.y) * 0.1;
                    if (glowRef.current) {
                        glowRef.current.style.left = glowPosRef.current.x + 'px';
                        glowRef.current.style.top = glowPosRef.current.y + 'px';
                    }
                    requestAnimationFrame(animate);
                };

                window.addEventListener('mousemove', handleMouseMove);
                animate();

                return () => window.removeEventListener('mousemove', handleMouseMove);
            }, []);

            return <div ref={glowRef} className="cursor-glow" />;
        };

        const MagneticButton = React.memo(({ children, className = '', strength = 0.2, ...props }) => {
            const buttonRef = useRef(null);
            const offsetRef = useRef({ x: 0, y: 0 });
            const [offset, setOffset] = useState({ x: 0, y: 0 });
            const rafRef = useRef(null);

            const handleMouseMove = useCallback((e) => {
                if (!buttonRef.current) return;
                if (rafRef.current) cancelAnimationFrame(rafRef.current);
                
                rafRef.current = requestAnimationFrame(() => {
                    const rect = buttonRef.current.getBoundingClientRect();
                    const centerX = rect.left + rect.width / 2;
                    const centerY = rect.top + rect.height / 2;
                    const deltaX = (e.clientX - centerX) * strength;
                    const deltaY = (e.clientY - centerY) * strength;
                    offsetRef.current = { x: deltaX, y: deltaY };
                    setOffset({ x: deltaX, y: deltaY });
                });
            }, [strength]);

            const handleMouseLeave = useCallback(() => {
                if (rafRef.current) cancelAnimationFrame(rafRef.current);
                offsetRef.current = { x: 0, y: 0 };
                setOffset({ x: 0, y: 0 });
            }, []);

            useEffect(() => {
                return () => {
                    if (rafRef.current) cancelAnimationFrame(rafRef.current);
                };
            }, []);

            return (
                <div
                    ref={buttonRef}
                    onMouseMove={handleMouseMove}
                    onMouseLeave={handleMouseLeave}
                    className={`magnetic-hover ${className}`}
                    style={{ transform: `translate(${offset.x}px, ${offset.y}px)` }}

                >
                    {children}
                </div>
            );
        });

        const AnimatedCounter = React.memo(({ end, duration = 2000, suffix = '' }) => {
            const [ref, isInView] = useInView();
            const [count, setCount] = useState(0);
            const countRef = useRef(0);
            const startTimeRef = useRef(null);
            const rafRef = useRef(null);

            useEffect(() => {
                if (!isInView) return;
                
                const animate = (timestamp) => {
                    if (!startTimeRef.current) startTimeRef.current = timestamp;
                    const progress = Math.min((timestamp - startTimeRef.current) / duration, 1);
                    const easeOut = 1 - Math.pow(1 - progress, 3);
                    const currentCount = Math.floor(easeOut * end);
                    
                    if (currentCount !== countRef.current) {
                        countRef.current = currentCount;
                        setCount(currentCount);
                    }
                    
                    if (progress < 1) {
                        rafRef.current = requestAnimationFrame(animate);
                    } else {
                        setCount(end);
                    }
                };
                
                rafRef.current = requestAnimationFrame(animate);
                
                return () => {
                    if (rafRef.current) cancelAnimationFrame(rafRef.current);
                };
            }, [isInView, end, duration]);

            return <span ref={ref} className="text-2xl font-bold text-slate-900 dark:text-white">{count}{suffix}</span>;
        });

        const GlowText = React.memo(({ children, className = '' }) => {

        const ScrollProgress = () => {
            const progressRef = useRef(0);

            const rafRef = useRef(null);

            useEffect(() => {
                const handleScroll = () => {
                    if (!rafRef.current) {
                        rafRef.current = requestAnimationFrame(() => {
                            const scrollTop = window.scrollY;
                            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
                            const newProgress = (scrollTop / docHeight) * 100;
                            if (Math.abs(newProgress - progressRef.current) > 0.5) {
                                progressRef.current = newProgress;
                                setProgress(newProgress);
                            }
                            rafRef.current = null;
                        });
                    }
                };
                window.addEventListener('scroll', handleScroll, { passive: true });
                return () => {
                    window.removeEventListener('scroll', handleScroll);
                    if (rafRef.current) cancelAnimationFrame(rafRef.current);
                };
            }, []);

            return (
                <div className="fixed top-0 left-0 h-0.5 gradient-bg z-[10001]" style={{ width: `${progress}%`, transition: 'width 0.1s linear' }} />

                const fastEls = document.querySelectorAll('.parallax-fast');

                const updateParallax = () => {
                    const scrolled = window.scrollY;
                    slowEls.forEach(el => {
                        el.style.transform = `translateY(${scrolled * 0.1}px) translateZ(0)`;
                    });
                    mediumEls.forEach(el => {
                        el.style.transform = `translateY(${scrolled * 0.2}px) translateZ(0)`;

                    fastEls.forEach(el => {
                        el.style.transform = `translateY(${scrolled * 0.3}px) translateZ(0)`;
                    });
                    ticking = false;
                };

                const handleScroll = () => {
                    if (!ticking) {
                        requestAnimationFrame(updateParallax);
                        ticking = true;
                    }
                };

                window.addEventListener('scroll', handleScroll, { passive: true });
                return () => window.removeEventListener('scroll', handleScroll);

        const ToolsSection = () => {
            const [tokenInput, setTokenInput] = useState('~r~Hello ~g~World~s~!');
            const [hashInput, setHashInput] = useState('FMAP_WAY');

            const tokenColors = {
                'r': 'text-red-500',
                'g': 'text-green-500',
                'b': 'text-blue-500',
                'y': 'text-yellow-500',
                'p': 'text-purple-500',
                'w': 'text-gray-200',
                'h': 'text-white',
                'l': 'text-gray-500',
                'o': 'text-pink-400',
                's': 'text-slate-400',
                'n': 'text-cyan-400',
            };

            const renderTokenText = (text) => {
                const result = [];
                let currentColor = null;
                let currentText = '';
                let i = 0;

                while (i < text.length) {
                    if (text[i] === '~' && i + 2 < text.length && text[i + 2] === '~') {
                        if (currentText) {
                            result.push(currentColor ? <span key={i} className={tokenColors[currentColor]}>{currentText}</span> : currentText);
                            currentText = '';
                        }
                        const token = text[i + 1].toLowerCase();
                        if (token === 'n') {
                            result.push(<br key={`br-${i}`} />);
                        } else if (token === 's') {
                            currentColor = null;
                        } else if (tokenColors[token]) {
                            currentColor = token;
                        }
                        i += 3;
                    } else {
                        currentText += text[i];
                        i++;
                    }
                }
                if (currentText) {
                    result.push(currentColor ? <span key="end" className={tokenColors[currentColor]}>{currentText}</span> : currentText);
                }
                return result.length > 0 ? result : <span className="text-slate-400 dark:text-slate-500">预览区域</span>;
            };

            const crc32 = (str) => {
                let crc = 0xFFFFFFFF;
                const table = [];
                for (let n = 0; n < 256; n++) {
                    let c = n;
                    for (let k = 0; k < 8; k++) c = ((c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1));
                    table[n] = c;
                }
                for (let i = 0; i < str.length; i++) crc = (crc >>> 8) ^ table[(crc ^ str.charCodeAt(i)) & 0xFF];
                return (crc ^ 0xFFFFFFFF) >>> 0;
            };

            const jamcrc = (str) => (0xFFFFFFFF ^ crc32(str.toUpperCase())) >>> 0;

            const gta4Hash = (str) => {
                let retHash = 0;
                for (let i = 0; i < str.length; i++) {
                    let c = str[i];
                    if (c >= 'A' && c <= 'Z') c = String.fromCharCode(c.charCodeAt(0) + 32);
                    else if (c === '\\') c = '/';
                    const cVal = c.charCodeAt(0) & 0xFF;
                    const tmp = (retHash + cVal) >>> 0;
                    const mult = (1025 * tmp) >>> 0;
                    retHash = ((mult >>> 6) ^ mult) >>> 0;
                }
                const a = (9 * retHash) >>> 0;
                return (32769 * (a ^ (a >>> 11))) >>> 0;
            };

            const quickTokens = [
                { token: '~r~', label: '红', color: 'hover:bg-red-500' },
                { token: '~g~', label: '绿', color: 'hover:bg-green-500' },
                { token: '~b~', label: '蓝', color: 'hover:bg-blue-500' },

                                </div>

                        </div>
                    </div>
                </footer>
            );
        });

        const App = () => {
            const [isDark, setIsDark] = useState(() => {
                if (typeof window !== 'undefined') {
                    return localStorage.getItem('theme') === 'dark' || 
                           (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);
                }
                return false;
            });

            useEffect(() => {
                document.documentElement.classList.toggle('dark', isDark);
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
            }, [isDark]);

            useEffect(() => {
                const loader = document.getElementById('pageLoader');
                if (loader) {
                    setTimeout(() => {
                        loader.classList.add('hidden');
                    }, 300);
                }
            }, []);

            const toggleTheme = useCallback(() => setIsDark(prev => !prev), []);

            return (
                <ThemeContext.Provider value={{ isDark, toggleTheme }}>
                    <ParticleCanvas />
                    <CursorGlow />
                    <ScrollProgress />
                    <ClickRipple />
                    <ParallaxEffect />
                    <Navbar />
                    <main>
                        <HeroSection />
                        <FeaturesSection />
                        <SpecsSection />
                        <FormatGuideSection />
                        <KeybindsSection />
                        <ToolsSection />
                        <DownloadSection />
                        <CommunitySection />
                        <CommentsSection />
                    </main>
                    <Footer />
                </ThemeContext.Provider>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

            var loader = document.getElementById('pageLoader');
            if (loader) loader.classList.add('hidden');

            if (loader) loader.classList.add('hidden');
