<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>使用教程 - GXTStudio</title>
    <link rel="icon" type="image/x-icon" href="icon/favicon.ico">
    <link rel="icon" type="image/png" href="icon/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                        },
                        accent: {
                            400: '#22d3ee',
                            500: '#06b6d4',
                        }
                    }
                },
            },
        }
    </script>
    <style>
        html { scroll-behavior: smooth; min-height: 100vh; }
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-image: url('image/Background.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.35);
            pointer-events: none;
            z-index: 0;
        }

        .dark body::before,
        html.dark body::before {
            background: rgba(15, 23, 42, 0.55);
        }

        #root {
            position: relative;
            z-index: 1;
        }

        .gradient-text {
            background: linear-gradient(135deg, #f97316, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #f97316, #ec4899);
        }

        .glass {
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            transform: translateZ(0);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(24px) saturate(200%);
            -webkit-backdrop-filter: blur(24px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transform: translateZ(0);
        }

        .dark .glass-card {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .glass-button {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transform: translateZ(0);
        }

        .dark .glass-button {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(32px) saturate(180%);
            -webkit-backdrop-filter: blur(32px) saturate(180%);
            transform: translateZ(0);
        }

        .dark .glass-panel {
            background: rgba(15, 23, 42, 0.6);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        .sidebar-link {
            transition: all 0.25s ease;
            position: relative;
        }

        .sidebar-link:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .dark .sidebar-link:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .sidebar-link.active {
            background: rgba(59, 130, 246, 0.12);
            color: #3b82f6;
            font-weight: 600;
        }

        .dark .sidebar-link.active {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }

        .sidebar-link.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 25%;
            bottom: 25%;
            width: 3px;
            background: linear-gradient(180deg, #f97316, #ec4899);
            border-radius: 0 2px 2px 0;
        }

        .sidebar-group-toggle {
            cursor: pointer;
            user-select: none;
        }

        .sidebar-group-toggle i.fa-chevron-down {
            transition: transform 0.3s ease;
        }

        .sidebar-group-toggle.expanded i.fa-chevron-down {
            transform: rotate(180deg);
        }

        .sidebar-sublist {
            overflow: hidden;
            transition: max-height 0.35s ease, opacity 0.3s ease;
            max-height: 0;
            opacity: 0;
        }

        .sidebar-sublist.expanded {
            max-height: 800px;
            opacity: 1;
        }

        .toast-popup {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            background: linear-gradient(135deg, #f97316, #ec4899);
            color: #fff;
            padding: 8px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
            pointer-events: none;
            animation: toastIn 0.25s ease, toastOut 0.25s ease 0.95s forwards;
            box-shadow: 0 8px 24px rgba(249, 115, 22, 0.3);
        }
        @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-12px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        @keyframes toastOut { from { opacity: 1; transform: translateX(-50%) translateY(0); } to { opacity: 0; transform: translateX(-50%) translateY(-12px); } }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in-up {
            animation: fadeInUp 0.4s ease forwards;
        }

        @keyframes highlight-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.3); }
            50% { box-shadow: 0 0 0 8px rgba(249, 115, 22, 0); }
        }

        .highlight-anim {
            animation: highlight-pulse 1.5s ease 1;
        }

        @media (max-width: 768px) {
            .sidebar-container {
                position: fixed;
                top: 56px;
                left: 0;
                right: 0;
                bottom: 0;
                z-index: 900;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }

            .sidebar-container.open {
                transform: translateX(0);
            }

            .content-area {
                margin-left: 0;
            }
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 transition-colors duration-300">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useRef, useCallback } = React;

        const ThemeContext = React.createContext();
        const useTheme = () => React.useContext(ThemeContext);

        const Navbar = () => {
            const { isDark, toggleTheme } = useTheme();
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll, { passive: true });
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <nav className={`fixed top-0 left-0 right-0 z-[1000] transition-all duration-300 ${scrolled ? 'py-2 glass bg-white/70 dark:bg-slate-900/70 border-b border-white/20 dark:border-white/5' : 'py-3'}`}>
                    <div className="max-w-screen-2xl mx-auto px-4 md:px-6 flex items-center justify-between">
                        <a href="index.html" className="flex items-center gap-2 group">
                            <img src="icon/favicon.png" alt="GXTStudio" className="w-8 h-8 sm:w-10 sm:h-10 rounded-lg sm:rounded-xl transition-transform group-hover:rotate-[-5deg] group-hover:scale-105" />
                            <span className="font-bold text-lg sm:text-xl text-slate-900 dark:text-white">GXT<span className="text-blue-500">Studio</span></span>
                            <span className="hidden sm:inline-block ml-2 px-2 py-0.5 text-sm font-medium text-orange-500 bg-orange-50 dark:bg-orange-500/10 rounded-full">使用教程</span>
                        </a>

                        <div className="flex items-center gap-3">
                            <button onClick={toggleTheme} className="w-9 h-9 sm:w-10 sm:h-10 rounded-xl glass-button flex items-center justify-center hover:scale-110 transition-transform relative overflow-hidden group">
                                <i className={`fas fa-sun text-amber-500 absolute transition-all duration-500 text-sm ${isDark ? 'opacity-0 rotate-180 scale-0' : 'opacity-100 rotate-0 scale-100'}`} />
                                <i className={`fas fa-moon text-indigo-500 absolute transition-all duration-500 text-sm ${isDark ? 'opacity-100 rotate-0 scale-100' : 'opacity-0 -rotate-180 scale-0'}`} />
                            </button>
                            <a href="index.html" className="px-4 py-2 rounded-xl glass-button text-base font-medium text-slate-600 dark:text-slate-300 hover:text-blue-500 transition-colors">
                                <i className="fas fa-arrow-left mr-1.5" />返回首页
                            </a>
                        </div>
                    </div>
                </nav>
            );
        };

        const Sidebar = ({ groups, activeSection, onSectionClick, mobileOpen, onMobileClose }) => {
            const [expandedGroups, setExpandedGroups] = useState({ tutorial: true, spec: true });

            const toggleGroup = (groupId) => {
                setExpandedGroups(prev => ({ ...prev, [groupId]: !prev[groupId] }));
            };

            const sidebarLinks = (items) => items.map((section) => {
                const isActive = activeSection === section.id;
                const isFaIcon = typeof section.icon === 'string' && section.icon.startsWith('fa-');
                return (
                    <li key={section.id}>
                        <a
                            href={`#${section.id}`}
                            onClick={(e) => {
                                e.preventDefault();
                                onSectionClick(section.id);
                                onMobileClose();
                            }}
                            className={`sidebar-link flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-base transition-all ${isActive ? 'active' : 'text-slate-600 dark:text-slate-400'}`}
                        >
                            {isFaIcon ? (
                                <i className={`fas ${section.icon} w-4 text-center ${isActive ? 'text-orange-500' : 'text-slate-400 dark:text-slate-500'}`} />
                            ) : (
                                <img src={section.icon} alt="" className={`w-5 h-5 ${isActive ? '' : 'opacity-50 dark:opacity-60'}`} />
                            )}
                            <span>{section.label}</span>
                            {isActive && <span className="ml-auto w-1.5 h-1.5 rounded-full gradient-bg" />}
                        </a>
                    </li>
                );
            });

            return (
                <aside className={`sidebar-container ${mobileOpen ? 'open' : ''} w-full md:w-72 lg:w-80 flex-shrink-0 md:static overflow-y-auto`}>
                    <nav className="glass-panel rounded-2xl p-3 md:p-4 h-full">
                        <div className="flex items-center justify-between md:hidden mb-3 px-2">
                            <span className="font-semibold text-base text-slate-500 dark:text-slate-400">目录</span>
                            <button onClick={onMobileClose} className="w-8 h-8 rounded-lg glass-button flex items-center justify-center">
                                <i className="fas fa-times text-sm" />
                            </button>
                        </div>
                        {groups.map((group) => (
                            <div key={group.id} className="mb-2">
                                <div
                                    className={`sidebar-group-toggle flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-sm font-semibold uppercase tracking-wider text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300 transition-colors ${expandedGroups[group.id] ? 'expanded' : ''}`}
                                    onClick={() => toggleGroup(group.id)}
                                >
                                    <i className={`fas ${group.icon} w-4 text-center text-orange-500`} />
                                    <span className="flex-1">{group.label}</span>
                                    <i className="fas fa-chevron-down text-xs" />
                                </div>
                                <ul className={`sidebar-sublist space-y-1 ${expandedGroups[group.id] ? 'expanded' : ''}`}>
                                    {sidebarLinks(group.items)}
                                </ul>
                            </div>
                        ))}
                    </nav>
                </aside>
            );
        };

        const TutorialStep = ({ number, title, children }) => {
            return (
                <div className="mb-8">
                    <div className="flex items-start gap-4 mb-3">
                        <span className="flex-shrink-0 w-9 h-9 rounded-lg gradient-bg flex items-center justify-center text-white text-base font-bold shadow-lg shadow-orange-500/20">
                            {number}
                        </span>
                        <h3 className="text-xl font-semibold text-slate-800 dark:text-slate-100 pt-0.5">{title}</h3>
                    </div>
                    <div className="ml-12 text-slate-600 dark:text-slate-300 leading-relaxed space-y-3">
                        {children}
                    </div>
                </div>
            );
        };

        const TipBox = ({ type = 'info', children }) => {
            const colors = {
                info: 'border-blue-400/30 bg-blue-50/50 dark:bg-blue-500/5 text-blue-700 dark:text-blue-300',
                warning: 'border-amber-400/30 bg-amber-50/50 dark:bg-amber-500/5 text-amber-700 dark:text-amber-300',
                success: 'border-emerald-400/30 bg-emerald-50/50 dark:bg-emerald-500/5 text-emerald-700 dark:text-emerald-300',
            };
            const icons = {
                info: 'fa-circle-info',
                warning: 'fa-triangle-exclamation',
                success: 'fa-circle-check',
            };

            return (
                <div className={`flex items-start gap-3 p-4 rounded-xl border ${colors[type]} text-base`}>
                    <i className={`fas ${icons[type]} mt-0.5 flex-shrink-0`} />
                    <div>{children}</div>
                </div>
            );
        };

        const CharMapIII = () => (
            <>
                <CharMapStep title="Font Style 0 — Bank（银行字体）" rows={[
                    {l:'20',c:' !△#$%&\'()*+,-./'},{l:'30',c:'0123456789:;◀=▶?'},{l:'40',c:'™ABCDEFGHIJKLMNO'},
                    {l:'50',c:'PQRSTUVWXYZ[\\]^°'},{l:'60',c:'`abcdefghijklmno'},{l:'70',c:'pqrstuvwxyz ◯ ~ '},
                    {l:'80',c:'ÀÁÂÄÆÇÈÉÊËÌÍÎÏÒÓ'},{l:'90',c:'ÔÖÙÚÛÜßàáâäæçèéê'},{l:'A0',c:'ëìíîïòóôöùúûüÑñ¿'},
                    {l:'B0',c:'¡\''},
                ]} />
                <CharMapStep title="Font Style 1 — Pager（寻呼机字体）" rows={[
                    {l:'20',c:' !"#$%&\'()- ,-. '},{l:'30',c:'0123456789:    ?'},{l:'40',c:' ABCDEFGHIJKLMNO'},
                    {l:'50',c:'PQRSTUVWXYZ     '},{l:'60',c:' abcdefghijklmno'},{l:'70',c:'pqrstuvwxyz  ~ '},
                    {l:'80',c:'ÀÁÂÄÆÇÈÉÊËÌÍÎÏÒÓ'},{l:'90',c:'ÔÖÙÚÛÜßàáâäæçèéê'},{l:'A0',c:'ëìíîïòóôöùúûüÑñ¿'},
                    {l:'B0',c:'¡'},
                ]} />
                <CharMapStep title="Font Style 2 — Heading（标题字体）" rows={[
                    {l:'20',c:' !△®$%&\'() +,-.✕'},{l:'30',c:'0123456789:▲◀▼▶?'},{l:'40',c:'™abcdefghijklmno'},
                    {l:'50',c:'pqrstuvwxyz \\ №°'},{l:'60',c:'©abcdefghijklmno'},{l:'70',c:'pqrstuvwxyz ◯ ~ '},
                    {l:'80',c:'àáâäæçèéêëìíîïòó'},{l:'90',c:'ôöùúûüßàáâäæçèéê'},{l:'A0',c:'ëìíîïòóôöùúûüññ¿'},
                    {l:'B0',c:'¡'},
                ]} />
            </>
        );

        const CharMapVC = () => (
            <>
                <CharMapStep title="Font Style 0 — Bank（银行字体）" rows={[
                    {l:'20',c:' !  $%&\'[] +,-. '},{l:'30',c:'0123456789:    ?'},{l:'40',c:' ABCDEFGHIJKLMNO'},
                    {l:'50',c:'PQRSTUVWXYZ \\ ¡\\'},{l:'60',c:' abcdefghijklmno'},{l:'70',c:'pqrstuvwxyz  ~ '},
                    {l:'80',c:'ÀÁÂÄÆÇÈÉÊËÌÍÎÏÒÓ'},{l:'90',c:'ÔÖÙÚÛÜßàáâäæçèéê'},{l:'A0',c:'ëìíîïòóôöùúûüÑñ¿'},
                    {l:'B0',c:'i'},
                ]} />
                <CharMapStep title="Font Style 1 — Standard（标准字体）" rows={[
                    {l:'20',c:' !"#$%&\'()*+,-./'},{l:'30',c:'0123456789:; = ?'},{l:'40',c:'™ABCDEFGHIJKLMNO'},
                    {l:'50',c:'PQRSTUVWXYZ[\\]¡°'},{l:'60',c:'`abcdefghijklmno'},{l:'70',c:'pqrstuvwxyz |$~)'},
                    {l:'80',c:'ÀÁÂÄÆÇÈÉÊËÌÍÎÏÒÓ'},{l:'90',c:'ÔÖÙÚÛÜßàáâäæçèéê'},{l:'A0',c:'ëìíîïòóôöùúûüÑñ¿'},
                    {l:'B0',c:'0123456789:a'},
                ]} />
                <CharMapStep title="Font Style 2 — Heading（标题字体）" rows={[
                    {l:'20',c:' !"#$%&\'()*+,-./'},{l:'30',c:'0123456789:; = ?'},{l:'40',c:'™abcdefghijklmno'},
                    {l:'50',c:'pqrstuvwxyz[\\]¡°'},{l:'60',c:'`abcdefghijklmno'},{l:'70',c:'pqrstuvwxyz |$~)'},
                    {l:'80',c:'àáâäæçèéêëìíîïòó'},{l:'90',c:'ôöùúûüßàáâäæçèéê'},{l:'A0',c:'ëìíîïòóôöùúûüññ¿'},
                    {l:'B0',c:'0123456789:abcde'},{l:'C0',c:'fghijklmnopqrstu'},{l:'D0',c:'vwxyzàáâäæçèéêëì'},
                    {l:'E0',c:'íîïòóôöùúûüßñ¿\'.'},
                ]} />
            </>
        );

        const CharMapStep = ({ title, rows }) => {
            const [copiedCell, setCopiedCell] = useState(null);
            const [toastMsg, setToastMsg] = useState(null);

            const calcHex = (rowLabel, colIndex) => {
                const rowVal = parseInt(rowLabel, 16);
                const hexVal = rowVal >= 0x20 ? rowVal + colIndex : rowVal * 16 + colIndex;
                return hexVal.toString(16).toUpperCase();
            };

            const handleCopy = (rowLabel, colIndex) => {
                const hexStr = calcHex(rowLabel, colIndex);
                navigator.clipboard.writeText(hexStr).catch(() => {});
                setCopiedCell(`${rowLabel}-${colIndex}`);
                setToastMsg('已复制 ' + hexStr);
                setTimeout(() => setCopiedCell(null), 1200);
                setTimeout(() => setToastMsg(null), 1200);
            };

            return (
            <div className="mb-8">
                {toastMsg && <div className="toast-popup">{toastMsg}</div>}
                <div className="flex items-start gap-4 mb-3">
                    <span className="flex-shrink-0 w-9 h-9 rounded-lg gradient-bg flex items-center justify-center text-white text-base font-bold shadow-lg shadow-orange-500/20" />
                    <h3 className="text-xl font-semibold text-slate-800 dark:text-slate-100 pt-0.5">{title}</h3>
                </div>
                <div className="ml-12 overflow-x-auto">
                    <table className="border-collapse font-mono text-xs mx-auto">
                        <thead>
                            <tr>
                                <th className="w-8 py-1 px-1 text-slate-400 font-normal"></th>
                                {['00','01','02','03','04','05','06','07','08','09','0A','0B','0C','0D','0E','0F'].map(h => <th key={h} className="w-8 text-center py-1 text-slate-400 font-normal">{h}</th>)}
                            </tr>
                        </thead>
                        <tbody>
                            {rows.map((r,i) => (
                                <tr key={i} className={i%2===0?'bg-white/20 dark:bg-white/5':''}>
                                    <td className="text-center py-0.5 px-1 text-orange-500 font-bold">{r.l}</td>
                                    {r.c.split('').map((ch,j) => (
                                        <td
                                            key={j}
                                            onClick={() => handleCopy(r.l, j)}
                                            title={calcHex(r.l, j)}
                                            className={`text-center py-0.5 cursor-pointer transition-colors ${copiedCell === `${r.l}-${j}` ? 'bg-orange-500/30 text-orange-600 dark:text-orange-300' : 'text-slate-700 dark:text-slate-200 hover:bg-blue-500/20 hover:text-blue-600 dark:hover:text-blue-300'}`}
                                        >
                                            {ch}
                                        </td>
                                    ))}
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            </div>
            );
        };

        const CharMapJpPS2 = () => (
            <CharMapStep title="PlayStation 2" rows={[
                {l:'80',c:'\u2003－\u201C\u201D\u2026\uff11\uff12\uff13\uff14\uff15\uff16\uff17\uff18\uff19\uff10'},
                {l:'90',c:'\u2003\u2003\u2003\u3000\u3001\u3002\u3005\u300C\u300D\u3041\u3042\u3044\u3046\u3047\u3048\u304A'},
                {l:'A0',c:'\u304B\u304C\u304D\u304E\u304F\u3050\u3051\u3052\u3053\u3054\u3055\u3056\u3057\u3058\u3059\u305A'},
                {l:'B0',c:'\u305B\u305C\u305D\u305E\u305F\u3060\u3061\u3063\u3064\u3065\u3066\u3067\u3068\u3069\u306A\u306B'},
                {l:'C0',c:'\u306C\u306D\u306E\u306F\u3070\u3071\u3072\u3073\u3075\u3076\u3077\u3078\u3079\u307A\u307B\u307C'},

                                            { key: '~GO_LEFT~', desc: '左移' },
                                            { key: '~GO_RIGHT~', desc: '右移' },
                                            { key: '~VEHICLE_ENTER_EXIT~', desc: '上/下车' },
                                            { key: '~PED_JUMPING~', desc: '跳跃' },
                                            { key: '~PED_SPRINT~', desc: '冲刺' },
                                            { key: '~PED_LOCK_TARGET~', desc: '瞄准' },
                                            { key: '~PED_DUCK~', desc: '蹲下' },
                                        ].map((item, i) => (
                                            <div key={i} className="flex items-center gap-2 px-3 py-2 rounded-lg glass-card">
                                                <code className="font-mono text-xs text-orange-500">{item.key}</code>
                                                <span className="text-sm text-slate-600 dark:text-slate-300">{item.desc}</span>
                                            </div>
                                        ))}
                                    </div>
                                </TutorialStep>

                                <TutorialStep number={6} title="载具控制 Token">
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 mt-2">
                                        {[
                                            { key: '~VEHICLE_ACCELERATE~', desc: '加速' },
                                            { key: '~VEHICLE_BRAKE~', desc: '刹车/倒车' },
                                            { key: '~VEHICLE_STEERLEFT~', desc: '左转' },
                                            { key: '~VEHICLE_STEERRIGHT~', desc: '右转' },
                                            { key: '~VEHICLE_HORN~', desc: '喇叭' },
                                            { key: '~VEHICLE_HANDBRAKE~', desc: '手刹' },
                                            { key: '~VEHICLE_FIREWEAPON~', desc: '载具武器射击' },
                                            { key: '~VEHICLE_CHANGE_RADIO_STATION~', desc: '切换电台' },
                                            { key: '~TOGGLE_SUBMISSIONS~', desc: '副任务切换' },
                                        ].map((item, i) => (
                                            <div key={i} className="flex items-center gap-2 px-3 py-2 rounded-lg glass-card">
                                                <code className="font-mono text-xs text-orange-500">{item.key}</code>
                                                <span className="text-sm text-slate-600 dark:text-slate-300">{item.desc}</span>
                                            </div>
                                        ))}
                                    </div>
                                </TutorialStep>
                            </div>
                        );

                    case 'gxt-charmaps':
                        return (
                            <div className="animate-fade-in-up">
                                <h2 className="text-3xl font-bold text-slate-800 dark:text-slate-100 mb-6">
                                    <i className="fas fa-table gradient-text mr-3" />字符映射表 (Character Maps)
                                </h2>
                                <p className="text-slate-600 dark:text-slate-300 leading-relaxed mb-6">
                                    以下是 GXT 文件中可用的全部字符映射。每个字符由一个十六进制值表示（行值 + 列值，如 <code className="px-1.5 py-0.5 rounded-md bg-slate-200 dark:bg-slate-700 font-mono text-sm">0x41</code> = 'A'）。空格或空单元格表示该码位未定义。
                                </p>

                                <div className="mb-6">
                                    <h3 className="text-xl font-semibold text-slate-800 dark:text-slate-100 mb-1">
                                        <img src="icon/III.ico" alt="" className="w-5 h-5 inline-block mr-2 align-text-bottom" />GTA III
                                    </h3>
                                    <p className="text-sm text-slate-500 dark:text-slate-400 mb-4">字体样式 1 中<em>斜体</em>字符使用 Pager 字体；样式 2 中<strong>粗体</strong>字符使用 <strong>Pricedown 字体</strong>或脏污效果。</p>
                                </div>
                                <CharMapIII />
                                <div className="mt-10 pt-6 border-t border-slate-200 dark:border-slate-700 mb-6">
                                    <h3 className="text-xl font-semibold text-slate-800 dark:text-slate-100 mb-1">
                                        <img src="icon/VC.ico" alt="" className="w-5 h-5 inline-block mr-2 align-text-bottom" />GTA Vice City
                                    </h3>
                                    <p className="text-sm text-slate-500 dark:text-slate-400 mb-4"><strong>粗体</strong>字符使用 Pricedown 字体或脏污效果；<em>斜体</em>字符使用 <strong>Rage Italic 字体</strong>。</p>
                                </div>
                                <CharMapVC />
                            </div>
                        );

                    case 'gxt-charmaps-jp':
                        return (
                            <div className="animate-fade-in-up">
                                <h2 className="text-3xl font-bold text-slate-800 dark:text-slate-100 mb-6">
                                    <i className="fas fa-language gradient-text mr-3" />日语字符映射 (Japanese)
                                </h2>
                                <p className="text-slate-600 dark:text-slate-300 leading-relaxed mb-6">
                                    以下为 GTA Vice City 日语版 GXT 文件中可用的全部字符映射。由于日语字符数量庞大，此页独立于主字符映射表。字符集大体遵循 Unicode 顺序但非完整 Unicode。
                                </p>

                                <div className="mb-6">
                                    <h3 className="text-xl font-semibold text-slate-800 dark:text-slate-100 mb-1">
                                        <img src="icon/VC.ico" alt="" className="w-5 h-5 inline-block mr-2 align-text-bottom" />Vice City — PlayStation 2
                                    </h3>
                                    <p className="text-sm text-slate-500 dark:text-slate-400 mb-4">包含全角符号、平假名、片假名和 JIS 第一/第二水准汉字。</p>
                                </div>
                                <CharMapJpPS2 />
                                <div className="mt-10 pt-6 border-t border-slate-200 dark:border-slate-700 mb-6">
                                    <h3 className="text-xl font-semibold text-slate-800 dark:text-slate-100 mb-1">
                                        <img src="icon/VC.ico" alt="" className="w-5 h-5 inline-block mr-2 align-text-bottom" />Vice City — PC
                                    </h3>
                                    <p className="text-sm text-slate-500 dark:text-slate-400 mb-4">在 PS2 版基础上增加了标准 ASCII 范围（0x20~0x7F），全角符号含箭头。</p>
                                </div>
                                <CharMapJpPC />
                                <div className="mt-10 pt-6 border-t border-slate-200 dark:border-slate-700 mb-6">
                                    <h3 className="text-xl font-semibold text-slate-800 dark:text-slate-100 mb-1">
                                        <img src="icon/VC.ico" alt="" className="w-5 h-5 inline-block mr-2 align-text-bottom" />Vice City — Mobile
                                    </h3>
                                    <p className="text-sm text-slate-500 dark:text-slate-400 mb-4">移动版，0x07~0x52 范围。布局与 PC 版基本一致但起始偏移不同。</p>
                                </div>
                                <CharMapJpMobile />
                                <p className="mt-4 text-sm text-slate-500 dark:text-slate-400">
                                    完整文档请查看 <a href="https://gtamods.com/wiki/GXT/Japanese" target="_blank" className="text-blue-500 hover:underline">GTAMods Wiki 日语字符映射 <i className="fas fa-external-link-alt text-xs" /></a>。
                                </p>
                            </div>
                        );

                    case 'gxt-tools':
                        return (
                            <div className="animate-fade-in-up">
                                <h2 className="text-3xl font-bold text-slate-800 dark:text-slate-100 mb-6">
                                    <i className="fas fa-screwdriver-wrench gradient-text mr-3" />工具与参考
                                </h2>

                                <TutorialStep number={1} title="相关工具">
                                    <p>以下是历史上出现过的 GXT 相关工具（部分已经过时，仅供参考）：</p>
                                    <div className="space-y-3 mt-2">
                                        {[
                                            { name: 'GXTStudio', desc: '现代化 GXT 编辑器，支持 III~V 全系列，AI 翻译（推荐使用）', active: true },
                                            { name: 'GTA2 GXT Editor v2.0', desc: 'GTA 2 专用编辑器 - 作者: Delfi' },
                                            { name: 'GTA GXT Editor v1.3', desc: '经典 GXT 编辑器 - 作者: Zverik' },
                                            { name: 'SAGE v0.9.7', desc: '多功能编辑器 - 作者: AleX AciD' },
                                            { name: 'GXT Editor 1.3', desc: 'VC 版编辑器 - 作者: Jevon (GTAGarage)' },
                                            { name: 'GXT Builder', desc: '构建工具 - 作者: Silent' },
                                            { name: 'SA GXT Editor v1.3', desc: 'SA 专用编辑器 - 作者: Hammer83' },
                                            { name: 'OpenIV', desc: '内置 GXT 文件查看器' },
                                        ].map((item, i) => (
                                            <div key={i} className={`flex items-center gap-3 p-3 rounded-xl glass-card ${item.active ? 'ring-2 ring-orange-500/30' : ''}`}>
                                                <i className={`fas ${item.active ? 'fa-star text-orange-500' : 'fa-toolbox text-slate-400'}`} />
                                                <div>
                                                    <div className="font-medium text-slate-800 dark:text-slate-100 text-sm">{item.name}</div>
                                                    <div className="text-xs text-slate-500 dark:text-slate-400">{item.desc}</div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </TutorialStep>

                                <TutorialStep number={2} title="参考资料">
                                    <div className="space-y-2">
                                        <a href="https://gtamods.com/wiki/GXT" target="_blank" className="flex items-center gap-3 p-3 rounded-xl glass-card hover:scale-[1.02] transition-transform">
                                            <i className="fas fa-book text-blue-500 text-lg" />
                                            <div>
                                                <div className="font-medium text-slate-800 dark:text-slate-100 text-sm">GTAMods Wiki - GXT</div>
                                                <div className="text-xs text-slate-500 dark:text-slate-400">官方 GXT 文件格式完整文档</div>
                                            </div>
                                            <i className="fas fa-external-link-alt text-xs text-slate-400 ml-auto" />
                                        </a>
                                        <a href="https://gtaforums.com" target="_blank" className="flex items-center gap-3 p-3 rounded-xl glass-card hover:scale-[1.02] transition-transform">
                                            <i className="fas fa-comments text-blue-500 text-lg" />
                                            <div>
                                                <div className="font-medium text-slate-800 dark:text-slate-100 text-sm">GTAForums</div>
                                                <div className="text-xs text-slate-500 dark:text-slate-400">GTA 模组社区讨论论坛</div>
                                            </div>
                                            <i className="fas fa-external-link-alt text-xs text-slate-400 ml-auto" />
                                        </a>
                                    </div>
                                </TutorialStep>
                            </div>
                        );

                    default:
                        return null;
                }
            };

            return (
                <main ref={contentRef} className="flex-1 overflow-y-auto px-4 md:px-6 lg:px-8 py-6 min-h-0 flex flex-col">
                    <div className="glass-card rounded-2xl p-5 md:p-8 max-w-5xl mx-auto w-full flex-1">
                        {renderContent()}
                        <div className="flex items-center justify-between mt-10 pt-6 border-t border-slate-200 dark:border-slate-700">
                            {(() => {
                                const currentIndex = allSections.findIndex(s => s.id === activeSection);
                                const prev = currentIndex > 0 ? allSections[currentIndex - 1] : null;
                                const next = currentIndex < allSections.length - 1 ? allSections[currentIndex + 1] : null;
                                return (
                                    <>
                                        <div>
                                            {prev ? (
                                                <button
                                                    onClick={() => onSectionClick(prev.id)}
                                                    className="inline-flex items-center gap-2 px-4 py-2.5 rounded-xl glass-button text-slate-600 dark:text-slate-300 hover:text-blue-500 dark:hover:text-blue-400 transition-all group"
                                                >
                                                    <i className="fas fa-chevron-left text-xs group-hover:-translate-x-0.5 transition-transform" />
                                                    <span className="text-sm font-medium">{prev.label}</span>
                                                </button>
                                            ) : <div />}
                                        </div>
                                        <div>
                                            {next ? (
                                                <button
                                                    onClick={() => onSectionClick(next.id)}
                                                    className="inline-flex items-center gap-2 px-4 py-2.5 rounded-xl gradient-bg text-white shadow-lg shadow-orange-500/20 hover:shadow-orange-500/30 transition-all group"
                                                >
                                                    <span className="text-sm font-medium">{next.label}</span>
                                                    <i className="fas fa-chevron-right text-xs group-hover:translate-x-0.5 transition-transform" />
                                                </button>
                                            ) : <div />}
                                        </div>
                                    </>
                                );
                            })()}
                        </div>
                    </div>
                </main>
            );
        };

        const MobileNavToggle = ({ onClick, section }) => {
            const labels = {};
            allSections.forEach(s => { labels[s.id] = s.label; });

            return (
                <button
                    onClick={onClick}
                    className="md:hidden fixed bottom-6 right-6 z-[950] w-14 h-14 rounded-2xl gradient-bg text-white shadow-lg shadow-orange-500/30 flex flex-col items-center justify-center gap-0.5 text-sm font-medium active:scale-95 transition-transform"
                >
                    <i className="fas fa-list-ul text-base mb-0.5" />
                    <span className="text-[10px]">{labels[section] || '目录'}</span>
                </button>
            );
        };

        const allSections = [
            { id: 'intro', label: '软件简介', icon: 'fa-rocket' },
            { id: 'open-file', label: '打开文件', icon: 'fa-folder-open' },
            { id: 'edit-text', label: '编辑文本', icon: 'fa-pen-to-square' },
            { id: 'save-export', label: '保存与导出', icon: 'fa-floppy-disk' },
            { id: 'search', label: '搜索功能', icon: 'fa-magnifying-glass' },
            { id: 'codetable', label: '码表转换', icon: 'fa-code' },
            { id: 'ai-translate', label: '智能翻译', icon: 'fa-robot' },
            { id: 'personalize', label: '个性化设置', icon: 'fa-paint-brush' },
            { id: 'gxt-overview', label: 'GXT 文件概述', icon: 'fa-file-lines' },
            { id: 'gxt-format-gta2', label: 'GTA 2 格式', icon: 'fa-2' },
            { id: 'gxt-format-gta3', label: 'GTA III 格式', icon: 'icon/III.ico' },
            { id: 'gxt-format-vc', label: 'GTA VC/LCS/VCS 格式', icon: 'icon/VC.ico' },
            { id: 'gxt-format-sa4', label: 'GTA SA/IV 格式', icon: 'icon/SA.ico' },
            { id: 'gxt-format-gta1', label: 'GTA 1 格式 (.fxt)', icon: 'fa-1' },
            { id: 'gxt-tokens', label: '标记 (Tokens)', icon: 'fa-tag' },
            { id: 'gxt-charmaps', label: '字符映射表', icon: 'fa-table' },
            { id: 'gxt-charmaps-jp', label: '日语字符映射', icon: 'fa-language' },
            { id: 'gxt-tools', label: '工具与参考', icon: 'fa-screwdriver-wrench' },
        ];

        const groups = [
            { id: 'tutorial', label: '使用教程', icon: 'fa-book', items: allSections.slice(0, 8) },
            { id: 'spec', label: 'GXT 文件规范', icon: 'icon/V.ico', items: allSections.slice(8) },
        ];

        const App = () => {
            const [isDark, setIsDark] = useState(() => {
                try {
                    const saved = localStorage.getItem('gxtstudio-theme');
                    if (saved) return JSON.parse(saved);
                    return window.matchMedia('(prefers-color-scheme: dark)').matches;
                } catch {
                    return false;
                }
            });
            const [activeSection, setActiveSection] = useState('intro');
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

            useEffect(() => {
                document.documentElement.classList.toggle('dark', isDark);
                try { localStorage.setItem('gxtstudio-theme', JSON.stringify(isDark)); } catch {}
            }, [isDark]);

            const toggleTheme = useCallback(() => setIsDark(prev => !prev), []);

            const handleSectionClick = useCallback((sectionId) => {
                setActiveSection(sectionId);
            }, []);

            const themeValue = React.useMemo(() => ({ isDark, toggleTheme }), [isDark, toggleTheme]);

            return (
                <ThemeContext.Provider value={themeValue}>
                    <div className="min-h-screen flex flex-col">
                        <Navbar />
                        <div className="flex-1 flex pt-16 md:pt-20 gap-4 p-4 md:p-6 max-w-screen-2xl mx-auto w-full md:overflow-hidden">
                            <Sidebar
                                groups={groups}
                                activeSection={activeSection}
                                onSectionClick={handleSectionClick}
                                mobileOpen={mobileMenuOpen}
                                onMobileClose={() => setMobileMenuOpen(false)}
                            />
                            <ContentArea activeSection={activeSection} onSectionClick={handleSectionClick} />
                        </div>
                        <MobileNavToggle
                            onClick={() => setMobileMenuOpen(true)}
                            section={activeSection}
                        />
                    </div>
                </ThemeContext.Provider>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
