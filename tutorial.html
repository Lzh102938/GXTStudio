<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>使用教程 - GXTStudio</title>
    <link rel="icon" href="icon/favicon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                        },
                        accent: {
                            400: '#22d3ee',
                            500: '#06b6d4',
                        }
                    }
                },
            },
        }
    </script>
    <style>
        html { scroll-behavior: smooth; min-height: 100vh; }
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-image: url('image/Background.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.35);
            pointer-events: none;
            z-index: 0;
        }

        .dark body::before,
        html.dark body::before {
            background: rgba(15, 23, 42, 0.55);
        }

        #root {
            position: relative;
            z-index: 1;
        }

        .gradient-text {
            background: linear-gradient(135deg, #f97316, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #f97316, #ec4899);
        }

        .glass {
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            transform: translateZ(0);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(24px) saturate(200%);
            -webkit-backdrop-filter: blur(24px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transform: translateZ(0);
        }

        .dark .glass-card {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .glass-button {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transform: translateZ(0);
        }

        .dark .glass-button {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(32px) saturate(180%);
            -webkit-backdrop-filter: blur(32px) saturate(180%);
            transform: translateZ(0);
        }

        .dark .glass-panel {
            background: rgba(15, 23, 42, 0.6);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        .sidebar-link {
            transition: all 0.25s ease;
            position: relative;
        }

        .sidebar-link:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .dark .sidebar-link:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .sidebar-link.active {
            background: rgba(59, 130, 246, 0.12);
            color: #3b82f6;
            font-weight: 600;
        }

        .dark .sidebar-link.active {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }

        .sidebar-link.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 25%;
            bottom: 25%;
            width: 3px;
            background: linear-gradient(180deg, #f97316, #ec4899);
            border-radius: 0 2px 2px 0;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in-up {
            animation: fadeInUp 0.4s ease forwards;
        }

        @keyframes highlight-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.3); }
            50% { box-shadow: 0 0 0 8px rgba(249, 115, 22, 0); }
        }

        .highlight-anim {
            animation: highlight-pulse 1.5s ease 1;
        }

        @media (max-width: 768px) {
            .sidebar-container {
                position: fixed;
                top: 56px;
                left: 0;
                right: 0;
                bottom: 0;
                z-index: 900;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }

            .sidebar-container.open {
                transform: translateX(0);
            }

            .content-area {
                margin-left: 0;
            }
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 transition-colors duration-300">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useRef, useCallback } = React;

        const ThemeContext = React.createContext();
        const useTheme = () => React.useContext(ThemeContext);

        const Navbar = () => {
            const { isDark, toggleTheme } = useTheme();
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll, { passive: true });
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <nav className={`fixed top-0 left-0 right-0 z-[1000] transition-all duration-300 ${scrolled ? 'py-2 glass bg-white/70 dark:bg-slate-900/70 border-b border-white/20 dark:border-white/5' : 'py-3'}`}>
                    <div className="max-w-screen-2xl mx-auto px-4 md:px-6 flex items-center justify-between">
                        <a href="index.html" className="flex items-center gap-2 group">
                            <img src="icon/favicon.png" alt="GXTStudio" className="w-8 h-8 sm:w-10 sm:h-10 rounded-lg sm:rounded-xl transition-transform group-hover:rotate-[-5deg] group-hover:scale-105" />
                            <span className="font-bold text-lg sm:text-xl">GXT<span className="text-blue-500">Studio</span></span>
                            <span className="hidden sm:inline-block ml-2 px-2 py-0.5 text-xs font-medium text-orange-500 bg-orange-50 dark:bg-orange-500/10 rounded-full">使用教程</span>
                        </a>

                        <div className="flex items-center gap-3">
                            <button onClick={toggleTheme} className="w-9 h-9 sm:w-10 sm:h-10 rounded-xl glass-button flex items-center justify-center hover:scale-110 transition-transform relative overflow-hidden group">
                                <i className={`fas fa-sun text-amber-500 absolute transition-all duration-500 text-sm ${isDark ? 'opacity-0 rotate-180 scale-0' : 'opacity-100 rotate-0 scale-100'}`} />
                                <i className={`fas fa-moon text-indigo-500 absolute transition-all duration-500 text-sm ${isDark ? 'opacity-100 rotate-0 scale-100' : 'opacity-0 -rotate-180 scale-0'}`} />
                            </button>
                            <a href="index.html" className="px-4 py-2 rounded-xl glass-button text-sm font-medium text-slate-600 dark:text-slate-300 hover:text-blue-500 transition-colors">
                                <i className="fas fa-arrow-left mr-1.5" />返回首页
                            </a>
                        </div>
                    </div>
                </nav>
            );
        };

        const Sidebar = ({ sections, activeSection, onSectionClick, mobileOpen, onMobileClose }) => {
            return (
                <aside className={`sidebar-container ${mobileOpen ? 'open' : ''} w-full md:w-64 lg:w-72 flex-shrink-0 md:static overflow-y-auto`}>
                    <nav className="glass-panel rounded-2xl p-3 md:p-4 h-full">
                        <div className="flex items-center justify-between md:hidden mb-3 px-2">
                            <span className="font-semibold text-sm text-slate-500 dark:text-slate-400">教程目录</span>
                            <button onClick={onMobileClose} className="w-8 h-8 rounded-lg glass-button flex items-center justify-center">
                                <i className="fas fa-times text-sm" />
                            </button>
                        </div>
                        <h3 className="hidden md:block px-3 pb-3 text-xs font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-wider">教程目录</h3>
                        <ul className="space-y-1">
                            {sections.map((section) => {
                                const isActive = activeSection === section.id;
                                return (
                                    <li key={section.id}>
                                        <a
                                            href={`#${section.id}`}
                                            onClick={(e) => {
                                                e.preventDefault();
                                                onSectionClick(section.id);
                                                onMobileClose();
                                            }}
                                            className={`sidebar-link flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-sm transition-all ${isActive ? 'active' : 'text-slate-600 dark:text-slate-400'}`}
                                        >
                                            <i className={`fas ${section.icon} w-4 text-center ${isActive ? 'text-orange-500' : 'text-slate-400 dark:text-slate-500'}`} />
                                            <span>{section.label}</span>
                                            {isActive && <span className="ml-auto w-1.5 h-1.5 rounded-full gradient-bg" />}
                                        </a>
                                    </li>
                                );
                            })}
                        </ul>
                    </nav>
                </aside>
            );
        };

        const TutorialStep = ({ number, title, children }) => {
            return (
                <div className="mb-8">
                    <div className="flex items-start gap-4 mb-3">
                        <span className="flex-shrink-0 w-8 h-8 rounded-lg gradient-bg flex items-center justify-center text-white text-sm font-bold shadow-lg shadow-orange-500/20">
                            {number}
                        </span>
                        <h3 className="text-lg font-semibold text-slate-800 dark:text-slate-100 pt-0.5">{title}</h3>
                    </div>
                    <div className="ml-12 text-slate-600 dark:text-slate-300 leading-relaxed space-y-3">
                        {children}
                    </div>
                </div>
            );
        };

        const TipBox = ({ type = 'info', children }) => {
            const colors = {
                info: 'border-blue-400/30 bg-blue-50/50 dark:bg-blue-500/5 text-blue-700 dark:text-blue-300',
                warning: 'border-amber-400/30 bg-amber-50/50 dark:bg-amber-500/5 text-amber-700 dark:text-amber-300',
                success: 'border-emerald-400/30 bg-emerald-50/50 dark:bg-emerald-500/5 text-emerald-700 dark:text-emerald-300',
            };
            const icons = {
                info: 'fa-circle-info',
                warning: 'fa-triangle-exclamation',
                success: 'fa-circle-check',
            };

            return (
                <div className={`flex items-start gap-3 p-4 rounded-xl border ${colors[type]} text-sm`}>
                    <i className={`fas ${icons[type]} mt-0.5 flex-shrink-0`} />
                    <div>{children}</div>
                </div>
            );
        };

        const ContentArea = ({ activeSection }) => {
            const contentRef = useRef(null);

            useEffect(() => {
                if (contentRef.current) {
                    contentRef.current.scrollTop = 0;
                }
            }, [activeSection]);

            const renderContent = () => {
                switch (activeSection) {
                    case 'intro':
                        return (
                            <div className="animate-fade-in-up">
                                <h2 className="text-2xl font-bold text-slate-800 dark:text-slate-100 mb-6">
                                    <i className="fas fa-rocket gradient-text mr-3" />软件简介
                                </h2>
                                <p className="text-slate-600 dark:text-slate-300 leading-relaxed mb-4">
                                    GXTStudio 是一款专业的 <strong className="text-orange-500">GTA 系列游戏文本资源编辑器</strong>，由 <strong>Lzh10_慕黑</strong> 使用 C++ 和 Qt6 开发，是原 III.VC.SAGXTExtracter 项目的替代品。
                                    用于查看、编辑和管理 GXT 格式的游戏文本文件。
                                </p>
                                <p className="text-slate-600 dark:text-slate-300 leading-relaxed mb-6">
                                    无论你是游戏汉化者、MOD 开发者还是普通玩家，GXTStudio 都能帮助你高效地处理游戏中的各种文本资源，
                                    包括菜单文本、任务描述、对话内容等。软件还支持 DAT 字库文件编辑、WHM 页面数据查看导出、AI 智能翻译等高级功能。
                                </p>

                                <h3 className="text-lg font-semibold text-slate-800 dark:text-slate-100 mb-4">主要功能</h3>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
                                    {[
                                        { icon: 'fa-language', title: '智能翻译系统', desc: '内置 AI 翻译引擎，支持小米 MiMo、DeepSeek 等大模型' },
                                        { icon: 'fa-table-cells', title: '多版本支持', desc: '兼容 GTA III~GTA V 全系列 GXT 格式' },
                                        { icon: 'fa-palette', title: '文本渲染预览', desc: '实时预览颜色标记、换行符、按键标记等' },
                                        { icon: 'fa-code', title: '码表转换', desc: '支持罪吧/拇指玩/Play汉化及VC/IV日语版本' },
                                        { icon: 'fa-magnifying-glass', title: '智能搜索', desc: '正则表达式、大小写敏感、高亮显示' },
                                        { icon: 'fa-rotate-left', title: '撤销重做', desc: '多步操作回退，编辑更安全可靠' },
                                        { icon: 'fa-file-export', title: '导出与批量导出', desc: '支持导出到文件，自动生成汇总与分表' },
                                        { icon: 'fa-gear', title: '个性化设置', desc: '自定义背景图片、高斯模糊、亮度调节' },
                                    ].map((item, i) => (
                                        <div key={i} className="flex items-start gap-3 p-3 rounded-xl glass-card">
                                            <i className={`fas ${item.icon} text-orange-500 mt-0.5`} />
                                            <div>
                                                <div className="font-medium text-slate-800 dark:text-slate-100 text-sm">{item.title}</div>
                                                <div className="text-xs text-slate-500 dark:text-slate-400">{item.desc}</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <h3 className="text-lg font-semibold text-slate-800 dark:text-slate-100 mb-4">支持的游戏</h3>
                                <div className="grid grid-cols-2 sm:grid-cols-3 gap-3 mb-6">
                                    {['GTA III','GTA Vice City','GTA San Andreas','GTA IV','GTA V'].map((game, i) => (
                                        <div key={i} className="text-center py-3 px-2 rounded-xl glass-card text-sm font-medium text-slate-700 dark:text-slate-300 hover:scale-105 transition-transform">
                                            {game}
                                        </div>
                                    ))}
                                </div>

                                <TipBox type="info">
                                    本软件免费开源，由 Lzh10_慕黑 开发维护。官方网站：gxtstudio.com。平台支持 Windows 7 及以上。
                                </TipBox>
                            </div>
                        );

                    case 'open-file':
                        return (
                            <div className="animate-fade-in-up">
                                <h2 className="text-2xl font-bold text-slate-800 dark:text-slate-100 mb-6">
                                    <i className="fas fa-folder-open gradient-text mr-3" />打开文件
                                </h2>

                                <TutorialStep number={1} title="打开 GXT 文件">
                                    <p>双击 <code className="px-1.5 py-0.5 rounded-md bg-slate-200 dark:bg-slate-700 font-mono text-sm text-orange-500">GXTStudio.exe</code> 启动编辑器，点击 <strong>文件 → 打开</strong>，选择要编辑的 .gxt 文件即可。</p>
                                    <TipBox type="warning">
                                        编辑前需<strong>解除只读模式</strong>，否则无法进行编辑。可在状态栏右下角切换。
                                    </TipBox>
                                </TutorialStep>

                                <TutorialStep number={2} title="多标签页支持">
                                    <p>GXTStudio 支持多标签页，你可以一次性打开多个 GXT 文件，每个文件独占一个标签页，方便在不同文件间快速切换。</p>
                                </TutorialStep>

                                <TutorialStep number={3} title="最近文件">
                                    <p>打开过一次文件后，程序会自动记录历史。通过 <strong>文件 → 最近文件</strong> 可以快速重新打开之前编辑过的文件。</p>
                                </TutorialStep>

                                <TutorialStep number={4} title="拖拽打开">
                                    <p>直接将 .gxt 文件从文件资源管理器拖拽到软件窗口中，即可快速打开。</p>
                                    <TipBox type="success">
                                        拖拽支持批量操作——选中多个文件后一起拖入即可同时打开。
                                    </TipBox>
                                </TutorialStep>
                            </div>
                        );

                    case 'edit-text':
                        return (
                            <div className="animate-fade-in-up">
                                <h2 className="text-2xl font-bold text-slate-800 dark:text-slate-100 mb-6">
                                    <i className="fas fa-pen-to-square gradient-text mr-3" />编辑文本
                                </h2>

                                <TutorialStep number={1} title="编辑GXT文本条目">
                                    <p>打开 GXT 文件后，标签页会显示 <strong>表格列表</strong> 和 <strong>文本条目表</strong>。</p>
                                    <ul className="list-disc list-inside space-y-1 text-sm mt-2">
                                        <li><strong>表格列表</strong>：右键或双击表格条目可重命名表名；点击下方 <span className="font-mono text-orange-500">+</span> 按钮可添加表格条目（部分版本的表格条目数受限）。</li>
                                        <li><strong>文本条目表</strong>：双击条目可编辑文本内容。若文本过长，可右键选择"编辑为"，进入独立弹窗编辑。</li>
                                    </ul>
                                </TutorialStep>

                                <TutorialStep number={2} title="添加新键值对">
                                    <p>在文本条目表下方填写 KEY 和 VALUE，点击 <span className="font-mono text-orange-500">+</span> 按钮即可添加新的键值对条目。</p>
                                </TutorialStep>

                                <TutorialStep number={3} title="批量替换">
                                    <p>使用 <strong>编辑 → 替换</strong>，在弹出的替换弹窗中输入要替换的字符和目标字符，即可批量替换。</p>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 mt-2">
                                        <div className="flex items-center gap-2 px-3 py-2 rounded-lg glass-card text-sm">
                                            <i className="fas fa-check-circle text-emerald-500 text-xs" />正则表达式替换
                                        </div>
                                        <div className="flex items-center gap-2 px-3 py-2 rounded-lg glass-card text-sm">
                                            <i className="fas fa-check-circle text-emerald-500 text-xs" />大小写敏感替换
                                        </div>
                                    </div>
                                </TutorialStep>

                                <TutorialStep number={4} title="删除条目">
                                    <p>右键文本条目选择删除即可移除。表格条目需点击右侧的 <i className="fas fa-trash text-red-400" /> 垃圾桶图标删除。</p>
                                    <TipBox type="warning">
                                        删除操作前请确认已解除只读模式。
                                    </TipBox>
                                </TutorialStep>

                                <TutorialStep number={5} title="撤销与重做">
                                    <p>通过 <strong>编辑 → 撤销</strong> 和 <strong>编辑 → 重做</strong>（快捷键 <kbd className="px-1.5 py-0.5 rounded-md bg-slate-200 dark:bg-slate-700 font-mono text-xs">Ctrl+Z</kbd> / <kbd className="px-1.5 py-0.5 rounded-md bg-slate-200 dark:bg-slate-700 font-mono text-xs">Ctrl+Y</kbd>）可回退或恢复操作。</p>
                                </TutorialStep>

                                <TutorialStep number={6} title="自动保存">
                                    <p>在程序窗口的 <strong>右下角</strong> 可切换是否开启自动保存功能，避免意外丢失编辑内容。</p>
                                </TutorialStep>

                                <h3 className="text-lg font-semibold text-slate-800 dark:text-slate-100 mb-4 mt-8 pt-4 border-t border-slate-200 dark:border-slate-700">特殊文件类型</h3>

                                <TutorialStep number={7} title="编辑 DAT 字库文件">
                                    <p>编辑 DAT 字库文件时，程序默认屏蔽 ASCII 字符（英文、数字、英文标点），仅保留非 ASCII 字符，同时自动屏蔽重复输入的字符，确保字库数据正确。</p>
                                </TutorialStep>

                                <TutorialStep number={8} title="WHM 页面数据文件">
                                    <p>WHM 文件为完整的页面数据文件，较为特殊，<strong>暂不支持编辑</strong>，仅支持查看与导出。</p>
                                </TutorialStep>
                            </div>
                        );

                    case 'save-export':
                        return (
                            <div className="animate-fade-in-up">
                                <h2 className="text-2xl font-bold text-slate-800 dark:text-slate-100 mb-6">
                                    <i className="fas fa-floppy-disk gradient-text mr-3" />保存与导出
                                </h2>

                                <TutorialStep number={1} title="保存文件">
                                    <p>修改完成后，点击工具栏的保存按钮即可保存当前文件。</p>
                                    <TipBox type="warning">
                                        保存操作会覆盖原始文件。建议在修改前先备份原始 GXT 文件。
                                    </TipBox>
                                </TutorialStep>

                                <TutorialStep number={2} title="导出文本">
                                    <p>点击 <strong>文件 → 导出</strong>，可选择导出路径和文件名。导出完成后程序会自动生成汇总文件以及各分表文件。</p>
                                </TutorialStep>

                                <TutorialStep number={3} title="批量导出">
                                    <p>在 <strong>文件 → 批量导出</strong> 弹窗中选择要导出的文件，即可批量导出多个 GXT 文件。</p>
                                </TutorialStep>

                                <TutorialStep number={4} title="另存为">
                                    <p>如需保留原始文件不变，可以使用 <strong>文件 → 另存为</strong> 将修改后的内容保存为新文件。</p>
                                </TutorialStep>
                            </div>
                        );

                    case 'search':
                        return (
                            <div className="animate-fade-in-up">
                                <h2 className="text-2xl font-bold text-slate-800 dark:text-slate-100 mb-6">
                                    <i className="fas fa-magnifying-glass gradient-text mr-3" />搜索功能
                                </h2>

                                <TutorialStep number={1} title="搜索条目">
                                    <p>在界面上方的搜索框中输入关键词即可在所有条目中快速搜索。支持以下搜索模式：</p>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mt-2">
                                        {[
                                            { title: '普通搜索', desc: '模糊匹配键名和文本内容' },
                                            { title: '正则表达式', desc: '使用正则表达式进行高级匹配' },
                                            { title: '大小写敏感', desc: '精确匹配大小写' },
                                            { title: '高亮显示', desc: '搜索到的关键词自动高亮' },
                                        ].map((item, i) => (
                                            <div key={i} className="flex items-start gap-2 p-3 rounded-xl glass-card">
                                                <i className="fas fa-check-circle text-emerald-500 text-xs mt-0.5" />
                                                <div>
                                                    <div className="font-medium text-slate-800 dark:text-slate-100 text-sm">{item.title}</div>
                                                    <div className="text-xs text-slate-500 dark:text-slate-400">{item.desc}</div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </TutorialStep>

                                <TutorialStep number={2} title="替换功能中的搜索">
                                    <p>在 <strong>替换功能</strong>（Ctrl+H）的弹窗中同样可以使用搜索功能，使用方式与主界面的搜索框一致，方便在替换前先定位目标条目。</p>
                                </TutorialStep>
                            </div>
                        );

                    case 'codetable':
                        return (
                            <div className="animate-fade-in-up">
                                <h2 className="text-2xl font-bold text-slate-800 dark:text-slate-100 mb-6">
                                    <i className="fas fa-code gradient-text mr-3" />码表转换
                                </h2>
                                <p className="text-slate-600 dark:text-slate-300 leading-relaxed mb-6">
                                    部分日语或中文 GXT 使用映射表来方便字符排序，导致 GXT 内容无法直接阅读，需要进行码表转换才能正常显示。
                                </p>

                                <TutorialStep number={1} title="下载码表资源">
                                    <p>本软件<strong>无内置编码转换表</strong>，需前往 <a href="https://github.com/GTASA-ACCHS/CN.resource" className="text-blue-500 hover:underline" target="_blank">静态资源站 <i className="fas fa-external-link-alt text-xs" /></a> 下载。</p>
                                    <div className="mt-2 grid grid-cols-2 sm:grid-cols-3 gap-2">
                                        {['罪吧汉化', '拇指玩汉化', 'Play汉化', 'VC日语官方', 'IV日语官方'].map((name, i) => (
                                            <div key={i} className="text-center py-2 px-3 rounded-lg glass-card text-sm text-slate-700 dark:text-slate-300">
                                                {name}
                                            </div>
                                        ))}
                                    </div>
                                </TutorialStep>

                                <TutorialStep number={2} title="应用码表">
                                    <p>在 <strong>编辑 → 码表转换</strong> 中选择要使用的码表文件，即可对当前 GXT 内容进行转换，使其恢复正常可读文本。</p>
                                </TutorialStep>

                                <TipBox type="info">
                                    码表转换仅影响显示，不会修改原始文件内容。如需永久转换，请在转换后保存文件。
                                </TipBox>
                            </div>
                        );

                    case 'ai-translate':
                        return (
                            <div className="animate-fade-in-up">
                                <h2 className="text-2xl font-bold text-slate-800 dark:text-slate-100 mb-6">
                                    <i className="fas fa-robot gradient-text mr-3" />智能翻译
                                </h2>
                                <p className="text-slate-600 dark:text-slate-300 leading-relaxed mb-6">
                                    GXTStudio 内置 AI 翻译引擎，支持批量翻译 GXT 文本条目，大幅提升汉化效率。
                                </p>

                                <TutorialStep number={1} title="配置API密钥">
                                    <p>程序内置 <strong>小米 MiMo</strong>（mimo-v2.5-pro）和 <strong>DeepSeek</strong>（deepseek-v4-pro / deepseek-v4-flash）大模型支持。请自行注册获取 API 密钥：</p>
                                    <div className="flex gap-3 mt-2">
                                        <a href="https://platform.xiaomimimo.com" target="_blank" className="inline-flex items-center gap-2 px-4 py-2 rounded-xl glass-card text-sm font-medium text-slate-700 dark:text-slate-300 hover:scale-105 transition-transform">
                                            <i className="fas fa-external-link-alt text-xs" />小米 MiMo
                                        </a>
                                        <a href="https://platform.deepseek.com" target="_blank" className="inline-flex items-center gap-2 px-4 py-2 rounded-xl glass-card text-sm font-medium text-slate-700 dark:text-slate-300 hover:scale-105 transition-transform">
                                            <i className="fas fa-external-link-alt text-xs" />DeepSeek
                                        </a>
                                    </div>
                                    <p className="mt-3 text-sm">可在设置中配置 API 密钥、系统提示词和批次大小。自动频率控制和重试机制确保翻译稳定性。</p>
                                    <TipBox type="warning">
                                        DeepSeek 旧版模型（deepseek-chat / deepseek-reasoner）将于 2026/07/24 弃用，请迁移至 V4 系列。
                                    </TipBox>
                                </TutorialStep>

                                <TutorialStep number={2} title="执行翻译">
                                    <p>通过 <strong>编辑 → 智能翻译</strong> 选择要翻译的文本条目即可执行。也可在表格中选定单元格区域，右键选择 <span className="font-mono text-orange-500 text-sm">🌐 翻译选定行</span> 快速翻译。</p>
                                    <TipBox type="success">
                                        建议翻译前先备份原始文件，翻译完成后请人工校对以确保准确性。
                                    </TipBox>
                                </TutorialStep>
                            </div>
                        );

                    case 'personalize':
                        return (
                            <div className="animate-fade-in-up">
                                <h2 className="text-2xl font-bold text-slate-800 dark:text-slate-100 mb-6">
                                    <i className="fas fa-paint-brush gradient-text mr-3" />个性化设置
                                </h2>

                                <TutorialStep number={1} title="设置背景图片">
                                    <p>在 <strong>视图 → 设置背景图片</strong> 中选择要使用的图片文件，即可自定义编辑器界面的背景。</p>
                                </TutorialStep>

                                <TutorialStep number={2} title="调整效果">
                                    <p>可调节 <strong>高斯模糊</strong> 和 <strong>亮度</strong> 参数来优化背景效果。注意：较高的模糊值可能会导致轻微的性能下降。</p>
                                </TutorialStep>

                                <TipBox type="info">
                                    背景图片设置会保存在本地配置中，下次启动软件时自动加载。
                                </TipBox>
                            </div>
                        );

                    default:
                        return null;
                }
            };

            return (
                <main ref={contentRef} className="flex-1 overflow-y-auto px-4 md:px-6 lg:px-8 py-6 min-h-0">
                    <div className="glass-card rounded-2xl p-5 md:p-8 max-w-4xl mx-auto">
                        {renderContent()}
                    </div>
                </main>
            );
        };

        const MobileNavToggle = ({ onClick, section }) => {
            const sections = {
                intro: '软件简介',
                'open-file': '打开文件',
                'edit-text': '编辑文本',
                'save-export': '保存与导出',
                search: '搜索功能',
                codetable: '码表转换',
                'ai-translate': '智能翻译',
                personalize: '个性化设置',
            };

            return (
                <button
                    onClick={onClick}
                    className="md:hidden fixed bottom-6 right-6 z-[950] w-14 h-14 rounded-2xl gradient-bg text-white shadow-lg shadow-orange-500/30 flex flex-col items-center justify-center gap-0.5 text-xs font-medium active:scale-95 transition-transform"
                >
                    <i className="fas fa-list-ul text-base mb-0.5" />
                    <span className="text-[10px]">{sections[section] || '目录'}</span>
                </button>
            );
        };

        const sections = [
            { id: 'intro', label: '软件简介', icon: 'fa-rocket' },
            { id: 'open-file', label: '打开文件', icon: 'fa-folder-open' },
            { id: 'edit-text', label: '编辑文本', icon: 'fa-pen-to-square' },
            { id: 'save-export', label: '保存与导出', icon: 'fa-floppy-disk' },
            { id: 'search', label: '搜索功能', icon: 'fa-magnifying-glass' },
            { id: 'codetable', label: '码表转换', icon: 'fa-code' },
            { id: 'ai-translate', label: '智能翻译', icon: 'fa-robot' },
            { id: 'personalize', label: '个性化设置', icon: 'fa-paint-brush' },
        ];

        const App = () => {
            const [isDark, setIsDark] = useState(() => {
                try {
                    const saved = localStorage.getItem('gxtstudio-theme');
                    if (saved) return JSON.parse(saved);
                    return window.matchMedia('(prefers-color-scheme: dark)').matches;
                } catch {
                    return false;
                }
            });
            const [activeSection, setActiveSection] = useState('intro');
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

            useEffect(() => {
                document.documentElement.classList.toggle('dark', isDark);
                try { localStorage.setItem('gxtstudio-theme', JSON.stringify(isDark)); } catch {}
            }, [isDark]);

            const toggleTheme = useCallback(() => setIsDark(prev => !prev), []);

            const handleSectionClick = useCallback((sectionId) => {
                setActiveSection(sectionId);
            }, []);

            const themeValue = React.useMemo(() => ({ isDark, toggleTheme }), [isDark, toggleTheme]);

            return (
                <ThemeContext.Provider value={themeValue}>
                    <div className="min-h-screen flex flex-col">
                        <Navbar />
                        <div className="flex-1 flex pt-16 md:pt-20 gap-4 p-4 md:p-6 max-w-screen-2xl mx-auto w-full md:overflow-hidden">
                            <Sidebar
                                sections={sections}
                                activeSection={activeSection}
                                onSectionClick={handleSectionClick}
                                mobileOpen={mobileMenuOpen}
                                onMobileClose={() => setMobileMenuOpen(false)}
                            />
                            <ContentArea activeSection={activeSection} />
                        </div>
                        <MobileNavToggle
                            onClick={() => setMobileMenuOpen(true)}
                            section={activeSection}
                        />
                    </div>
                </ThemeContext.Provider>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
